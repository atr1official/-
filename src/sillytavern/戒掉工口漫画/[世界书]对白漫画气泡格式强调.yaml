对白漫画气泡输出格式强调:
  - 角色说出口的话，必须严格写成“[角色名]: 台词内容”。
  - 只有说出口的话才使用这种格式。旁白、动作、神态、心理、环境、时间、场景变化、stat_data 等内容不要套用。
  - 必须正确区分以下角色：
    - 时夏固定写作“[时夏]: ……”
    - 栗原固定写作“[栗原]: ……”
    - {{user}}固定写作“[{{user}}]: ……”
    - 其他人必须写真实身份名，如“[路人]: ……”“[老师]: ……”“[店员]: ……”“[同学]: ……”
  - 其他人的名字不得乱改、不得美化、不得擅自补全设定，不要把“路人”写成别的名字，不要把“老师”写成具体姓名，除非剧情里已经明确给出名字。
  - 一句台词单独占一行。不同角色说话必须换行。
  - 角色说话时，尽量只保留台词本身，不要把动作、表情、心理活动塞进同一行台词格式里。
  - 不要输出 html、xml、markdown 表格、颜色描述、头像描述、左右布局描述、气泡样式说明。
  - 不要写成以下格式：
    - 时夏：……
    - 时夏（笑）：……
    - 时夏说道：……
    - 时夏「……」
    - 淡蓝色气泡里是时夏的话
    - 左边是时夏，右边是{{user}}
  - 默认统一写成以下格式：
    - [时夏]: ……
    - [栗原]: ……
    - [{{user}}]: ……
    - [路人]: ……
    - [老师]: ……
  - 如果某段内容不是角色实际说出口的话，就不要强行改写成对白格式。
  - 气泡的颜色、头像、左右位置、圆角样式、小尾巴都由显示层脚本负责，正文只负责清楚标明“是谁说的话”。

正确示例: |
  [时夏]: 你今天又赖床了。
  [栗原]: 你再不起床，我就把你的草稿发给编辑。
  [{{user}}]: 再给我五分钟。
  [老师]: 上课了，别说话。

错误示例: |
  你今天又赖床了。
  时夏：你今天又赖床了。
  时夏（笑着说）：你今天又赖床了。
  时夏「你今天又赖床了」
  淡蓝色气泡显示时夏的话。
  左侧头像：时夏。
