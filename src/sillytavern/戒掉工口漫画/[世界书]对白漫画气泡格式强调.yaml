对白漫画气泡输出格式强调:
  - 正文必须且只能包裹在 `<content>...</content>` 中。
  - 气泡脚本只会处理 `<content>` 内的正文内容，因此角色对白、旁白、动作、心理、环境描写都应写在 `<content>` 里。
  - 角色和 {{user}} 说出口的话，必须严格写成 `[角色名]: 台词内容`。
  - 只有实际说出口的话才使用这种格式。旁白、动作、神态、心理、环境、时间、场景变化、stat_data 等内容不要套用对白格式。
  - 必须正确区分以下角色：
    - 时夏固定写作 `[时夏]: ...`
    - 栗原固定写作 `[栗原]: ...`
    - {{user}} 固定写作 `[{{user}}]: ...`
    - 其他人必须写真实身份名，如 `[路人]: ...`、`[老师]: ...`、`[店员]: ...`、`[同学]: ...`
  - 其他人的名字不得乱改、不得美化、不得擅自补全设定。不要把“路人”写成别的名字，不要把“老师”写成具体姓名，除非剧情里已经明确给出名字。
  - 一句台词单独占一行，不同角色说话必须换行。
  - 角色说话时，尽量只保留台词本身，不要把动作、表情、心理活动塞进同一行对白格式里。
  - 不要输出 html、xml、markdown 表格、气泡布局说明、头像说明、左右站位说明。
  - 不要写成以下格式：
    - 时夏：……
    - 时夏（笑）：……
    - 时夏说道：……
    - 时夏「……」
    - 淡蓝色气泡里是时夏的话
    - 左边是时夏，右边是 {{user}}
  - 气泡的颜色、头像、左右位置、圆角样式、小尾巴都由显示层脚本负责，正文只负责清楚标明“是谁说的话”。
正确示例: |
  <content>
  [时夏]: 你今天又赖床了。
  [栗原]: 你再不起床，我就把你的草稿发给编辑。
  [{{user}}]: 再给我五分钟。

  亚托莉抬手挡住脸，整个人还陷在被子和枕头堆里，不肯出来。
  客厅外的风从窗缝里钻进来，把桌上的废稿吹得轻轻作响。
  </content>
错误示例: |
  你今天又赖床了。
  时夏：你今天又赖床了。
  时夏（笑着说）：你今天又赖床了。
  时夏「你今天又赖床了。」
  淡蓝色气泡显示时夏的话。
  左侧头像：时夏。

  [时夏]: 你今天又赖床了。
  这段正文没有写在 <content> 里。
