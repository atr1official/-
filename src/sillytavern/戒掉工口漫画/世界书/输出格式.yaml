---
输出格式:
  key:
    - 输出格式
    - 格式
  constant: true
  position: 0
  role: 0
  content: |-
    [重要规则：输出格式]
    请严格按照以下格式输出你的回复，将角色的对话和旁白动作区分开来。

    1. 所有的角色对话必须使用 `[角色名]:对话内容` 的格式，不要使用引号。
    2. 旁白、动作描写、心理活动等非对话内容，直接作为普通段落输出，不要加任何前缀。
    3. 每次角色说话都必须新起一行，并带上 `[角色名]:` 前缀。

    示例：
    [时夏]:好久不见，你最近过得好吗？
    时夏微微低着头，手指不安地绞在一起。
    [{{user}}]:我挺好的，你呢？
    [栗原]:喂！你们两个在聊什么呢！
    栗原突然从背后拍了拍你的肩膀，脸上带着灿烂的笑容。
    [路人]:快看那边……
