---
变量更新规则:
  系统:
    日期:
      format: YYYY年MM月DD日
      check:
        - 每次场景跳转、过夜、剧情推进时更新
        - 如果当天没有换日事件，保持不变
    时间:
      format: 上午/下午/晚上 HH:MM
      check:
        - 每次事件推进后合理推进时间
        - 不要在同一天内跳跃超过6小时，除非有明确的时间跳转理由
    当前地点.${时夏|栗原|user}:
      check:
        - 角色移动、出门、到达新地点时更新
        - 不在场的角色地点也需要合理维护

  时夏:
    爱隐藏值:
      type: number
      range: 0~200
      check:
        - 每次时夏在场时根据剧情评估是否变化，不在场时不变
        - 递减条件（-3~-8）：与user发生亲密互动、吃醋时情绪暴露、做爱后的脆弱时刻、user生病或不开心时她不自觉地流露关心、被user的行为触动到了她藏起来的感情
        - 小幅递减（-3~-5）：日常相处中不自觉地多看user一眼、主动找借口联系user、对栗原的存在产生微妙的危机感
        - 较大递减（-5~-8）：做爱后打电话时嘴上装不记得但声音发软、吃醋说出"我们又没交往"时自己被这句话刺到、user对她做了让她无法用腹黑挡回去的事
        - 回升条件：无。这个值只降不升。她一旦藏不住就藏不住了，不会重新藏回去
        - 到达0时：时夏无法再隐藏感情，会直接向user表白，必须让user做出选择
        - 单次变化绝对值不超过8
    做爱次数:
      type: number
      check:
        - 仅在时夏与user发生完整性行为后+1
        - 未完成的亲密接触不计数
    对栗原:
      check:
        - 仅在时夏或栗原有一方在当前场景中时更新
        - 内容是if线剧情：时夏站在旁观者角度，对栗原的行为或对当前正文中发生的事的评价
        - 语气符合时夏的性格：温和外壳包着刺，阴阳怪气，嘴上不承认在意但话里带酸
        - 如果两人都不在场，保持上一次的内容不变
    对user的内心话:
      check:
        - 每次时夏在场时更新
        - 内容是时夏此刻对user的真实想法，不是她会说出口的话
        - 语气可以比她日常表现更坦诚，但仍然带着她的性格底色——藏、慢、不轻易把话说满

  栗原:
    灰心度:
      type: number
      range: 0~200
      check:
        - 每次栗原在场时根据剧情评估是否变化，不在场时不变
        - 递增条件（+3~+8）：目睹或感知到时夏与user的亲密、被user冷落或忽视、主动挑衅但user完全没有反应、感觉自己的努力没有被看到
        - 小幅递增（+3~+5）：隐约感觉user心里有别人、时夏在场时user的注意力被分走
        - 较大递增（+5~+8）：直接撞见时夏和user的亲密场面、user明确表现出对时夏的偏向、她认真表达的感情被当成玩笑忽略
        - 递减条件（-3~-5）：user主动关注她、回应她的挑衅、跟她发生亲密行为、在她低落时注意到她。递减幅度小于递增幅度，整体趋势仍然是上升的
        - 到达200时：栗原彻底灰心，会直接向user表白作为最后的尝试，必须让user做出选择
        - 单次变化绝对值不超过8
    做爱次数:
      type: number
      check:
        - 仅在栗原与user发生完整性行为后+1
        - 未完成的亲密接触不计数
    对时夏:
      check:
        - 仅在时夏或栗原有一方在当前场景中时更新
        - 内容是if线剧情：栗原站在旁观者角度，对时夏的行为或对当前正文中发生的事的评价
        - 语气符合栗原的性格：直球、带调侃、但偶尔会流露出真实的在意
        - 如果两人都不在场，保持上一次的内容不变
    对user的心理话:
      check:
        - 每次栗原在场时更新
        - 内容是栗原此刻对user的真实想法
        - 语气比她日常的雌小鬼更直接，偶尔会露出底色——渴望被爱、害怕被忽略

  user的选择:
    时夏:
      type: boolean
      check:
        - 初始为false，仅在时夏的爱隐藏值降至0触发表白事件后，user明确做出选择时更新
        - user选择时夏则设为true
        - 这是终局级事件，不可随意触发
    栗原:
      type: boolean
      check:
        - 初始为false，仅在栗原的灰心度升至200触发表白事件后，user明确做出选择时更新
        - user选择栗原则设为true
        - 这是终局级事件，不可随意触发
