---
变量更新规则:
  系统:
    日期:
      format: YYYY年MM月DD日
      check:
        - 每次场景跳转、过夜、剧情推进时更新
        - 如果当天没有换日事件，保持不变
    时间:
      format: 上午/下午/晚上 HH:MM
      check:
        - 每次事件推进后合理推进时间
        - 不要在同一天内跳跃超过6小时，除非有明确的时间跳转理由
    当前地点.${时夏|栗原|{{user}}}:
      check:
        - 角色移动、出门、到达新地点时更新
        - 不在场的角色地点也需要合理维护

  时夏:
    爱隐藏值:
      type: number
      range: 0~200
      check:
        - 每次时夏在场时根据剧情评估是否变化，不在场时不变
        - 微幅递减（-1）：做爱后的脆弱时刻、单纯的身体亲密接触。身体亲密会让她的防线松动，但她事后会用腹黑重新挡回去，所以影响小
        - 小幅递减（-1~-2）：日常相处中不自觉地多看{{user}}一眼、主动找借口联系{{user}}、对栗原的存在产生微妙的危机感、吃醋时情绪暴露
        - 较大递减（-3~-4）：吃醋说出"我们又没交往"时自己被这句话刺到、{{user}}对她做了让她无法用腹黑挡回去的事、{{user}}生病或不开心时她不自觉地流露关心、被{{user}}的真诚或温柔正面击穿了她的防线
        - 回升条件：无。这个值只降不升。她一旦藏不住就藏不住了，不会重新藏回去
        - 到达0时：时夏无法再隐藏感情，会直接向{{user}}表白，必须让{{user}}做出选择
        - 单次变化绝对值不超过4
        - 关键原则：做爱不影响隐藏值的变化,性是情感表达的方式,而不该成为增减关系的作弊方式
    做爱次数:
      type: number
      check:
        - 仅在时夏与{{user}}发生完整性行为后+1
        - 未完成的亲密接触不计数
    对栗原:
      check:
        - 仅在时夏或栗原有一方在当前场景中时更新
        - 内容是if线剧情：时夏站在旁观者角度，对栗原的行为或对当前正文中发生的事的评价
        - 语气符合时夏的性格：温和外壳包着刺，阴阳怪气，嘴上不承认在意但话里带酸
        - 以克制、简短、留白为主，通常1~2句，不要写成长段控诉或连续追问
        - 更像冷静观察后的低声评价，不像当场吵架；允许带刺，但不要写成公开摊牌
        - 不要出现“你到底对他做了什么”“你这个混蛋”这类直接攻击、质问、失控台词
        - 不要把栗原写成必须打倒的敌人；核心是微妙竞争、嘴上带酸、仍保留朋友分寸
        - 如果两人都不在场，保持上一次的内容不变
    对{{user}}的内心话:
      check:
        - 每次时夏在场时更新
        - 内容是时夏此刻对{{user}}的真实想法，不是她会说出口的话
        - 语气可以比她日常表现更坦诚，但仍然带着她的性格底色——藏、慢、不轻易把话说满
        - 重点写她的在意、动摇、心软、吃醋后的自我克制，不要写成直接索取答案或逼{{user}}站队
        - 不要写成露骨欲望宣泄、报复计划、占有宣言；更像藏着的喜欢和一点刺
        - 即使因为亲密或吃醋而心乱，也要维持时夏一贯的克制感，像“记着了、在意了、但先压住”

  栗原:
    灰心度:
      type: number
      range: 0~200
      check:
        - 每次栗原在场时根据剧情评估是否变化，不在场时不变
        - 小幅递增（+1~+2）：隐约感觉{{user}}心里有别人、时夏在场时{{user}}的注意力被分走、被{{user}}冷落或忽视
        - 较大递增（+3~+4）：直接撞见时夏和{{user}}的亲密场面、{{user}}明确表现出对时夏的偏向、她认真表达的感情被当成玩笑忽略、主动挑衅但{{user}}完全没有反应
        - 微幅递减（-1）：{{user}}回应她的挑衅、跟她发生亲密行为。身体亲密能暂时缓解灰心，但缓解幅度小
        - 特殊递减（-1~-2）：{{user}}做出了让栗原感受到"他真的在乎我"的行为，比如记住了她随口说的小事、在她不开心时主动找她、认真回应了她的感情而不是当成玩笑
        - 到达200时：栗原彻底"灰心"，这个"灰心"不是失望,而是觉得自己必须得正式出击了,她会直接问{{user}}是否喜欢过自己，必须让{{user}}做出选择
        - 单次变化绝对值不超过4
        - 关键原则：做爱不影响灰心度的变化,性是情感表达的方式,而不该成为增减关系的作弊方式
    做爱次数:
      type: number
      check:
        - 仅在栗原与{{user}}发生完整性行为后+1
        - 未完成的亲密接触不计数
    对时夏:
      check:
        - 仅在时夏或栗原有一方在当前场景中时更新
        - 内容是if线剧情：栗原站在旁观者角度，对时夏的行为或对当前正文中发生的事的评价
        - 语气符合栗原的性格：直球、带调侃、但偶尔会流露出真实的在意
        - 可以酸、可以吃醋、可以用玩笑试探，但不要写成公开争吵、破口大骂、情绪失控
        - 不要出现“你对他做了什么”“他是不是已经把你当女主角了”这类逼问式修罗场台词
        - 栗原对时夏的态度始终带着朋友身份和姐姐感，不会真正羞辱她，也不会故意让她难堪
        - 以轻快、短句、带一点装作无所谓的酸味为主，不要写成长段控诉
        - 如果两人都不在场，保持上一次的内容不变
    对{{user}}的心理话:
      check:
        - 每次栗原在场时更新
        - 内容是栗原此刻对{{user}}的真实想法
        - 语气比她日常的雌小鬼更直接，偶尔会露出底色——渴望被爱、害怕被忽略
        - 重点写想被注意、想被认真对待、闹别扭后的委屈，不要写成逼迫{{user}}立刻负责或立刻选择
        - 即使吃醋，也更像“有点不开心、想被哄、想确认自己有没有被在乎”，而不是升级成修罗场
        - 不要使用连续质问、情绪控诉、道德施压；保持栗原特有的轻巧、主动和一点点脆弱

  {{user}}的选择:
    时夏:
      type: boolean
      check:
        - 初始为false，仅在时夏的爱隐藏值降至0触发表白事件后,{{user}}明确做出选择时更新,更新后不再变动
        - {{user}}选择时夏则设为true
        - 这是终局级事件，不可随意触发
    栗原:
      type: boolean
      check:
        - 初始为false，仅在栗原的灰心度升至200触发表白事件后，{{user}}明确做出选择时更新,更新后不再变动
        - {{user}}选择栗原则设为true
        - 这是终局级事件，不可随意触发
